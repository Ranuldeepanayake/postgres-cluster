scope: postgres-cluster
namespace: /db/
name: patroni-1

restapi:
  listen: 0.0.0.0:8008
  connect_address: patroni-1:8008

etcd3:
  hosts:
    - patroni-1:2379 
    - patroni-2:2379
    - patroni-3:2379
  protocol: http
  timeout: 30
  api_version: v3

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10

  initdb:
    - encoding: UTF8
    - data-checksums

  users:
    replication:
      password: replpass
      options:
        - replication
    admin:
      password: adminpass
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: patroni-1:5432
  data_dir: /home/postgres/pgdata
  bin_dir: /usr/lib/postgresql/18/bin
  pg_hba:
    - host all all 127.0.0.1/32 md5
    - host replication replication 172.18.0.0/16 md5
  authentication:
    replication:
      username: replication
      password: replpass
    superuser:
      username: postgres
      password: postgres
    rewind:
      username: replication
      password: replpass