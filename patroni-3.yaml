scope: postgres-cluster
namespace: /db/
name: patroni-3

restapi:
  listen: 0.0.0.0:8008
  connect_address: patroni-3:8008

etcd:
  hosts:
    - patroni-1:2379
    - patroni-2:2379
    - patroni-3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    postgresql:
      use_pg_rewind: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_wal_senders: 10
        max_replication_slots: 10

  initdb:
    - encoding: UTF8
    - data-checksums

  users:
    replication:
      password: replpass
      options:
        - replication
    admin:
      password: adminpass
      options:
        - createrole
        - createdb

postgresql:
  listen: 0.0.0.0:5432
  connect_address: patroni-3:5432
  data_dir: /home/postgres/pgdata
  bin_dir: /usr/lib/postgresql/18/bin
  # data_dir: /var/lib/postgresql/15/main
  authentication:
    replication:
      username: replication
      password: replpass
    superuser:
      username: postgres
      password: postgres
    rewind:
      username: replication
      password: replpass