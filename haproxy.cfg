global
    log stdout format raw local0
    maxconn 2000

defaults
    log global
    mode tcp
    timeout connect 5s
    timeout client  30s
    timeout server  30s

# ---- Frontend for writes ----
frontend postgres_write
    bind *:5432
    default_backend pg_write

# ---- Frontend for reads ----
frontend postgres_read
    bind *:5433
    default_backend pg_read

# ---- Write backend (primary only) ----
backend pg_write
    mode tcp
    option httpchk GET /master
    http-check expect status 200
    server patroni-1 patroni-1:5432 check port 8008
    server patroni-2 patroni-2:5432 check port 8008
    server patroni-3 patroni-3:5432 check port 8008

# ---- Read backend (replicas only) ----
backend pg_read
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    server patroni-1 patroni-1:5432 check port 8008
    server patroni-2 patroni-2:5432 check port 8008
    server patroni-3 patroni-3:5432 check port 8008

# ---- Optional HAProxy stats ----
listen stats
    bind *:8404
    mode http
    stats enable
    stats uri /